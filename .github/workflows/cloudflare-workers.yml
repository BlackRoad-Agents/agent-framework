# BlackRoad OS, Inc. — Proprietary and Confidential
# Cloudflare Workers — Long-running Agent Tasks
# Handles async agent execution, webhooks, and scheduled jobs

name: Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - "wrangler.toml"
  pull_request:
    branches: [main]
    paths:
      - "workers/**"
      - "wrangler.toml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  test-workers:
    name: Test Workers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test workers
        run: npm run test:workers

  deploy-agent-router:
    name: Deploy Agent Router Worker
    runs-on: ubuntu-latest
    needs: [test-workers]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy Agent Router
        uses: cloudflare/wrangler-action@da0e0d511c2b865af7c3fe61c4e0e5f3e3c73af3 # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml
          wranglerVersion: "3.99.0"

  deploy-task-queue:
    name: Deploy Task Queue Worker
    runs-on: ubuntu-latest
    needs: [test-workers]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy Task Queue
        uses: cloudflare/wrangler-action@da0e0d511c2b865af7c3fe61c4e0e5f3e3c73af3 # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/task-queue/wrangler.toml
          wranglerVersion: "3.99.0"
