# BlackRoad OS, Inc. — Proprietary and Confidential
# Deploy Pipeline — Agent Framework
# Deploys to Cloudflare Workers, Vercel, and Railway

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  build:
    name: Build for Deploy
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deploy-build
          path: dist/
          retention-days: 7

  deploy-cloudflare:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [build]
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: deploy-build
          path: dist/

      - name: Deploy Worker — Agent Router
        uses: cloudflare/wrangler-action@da0e0d511c2b865af7c3fe61c4e0e5f3e3c73af3 # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml
          wranglerVersion: "3.99.0"

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build]
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@39.3.0

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ inputs.environment || 'production' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [build]
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Railway CLI
        run: npm install -g @railway/cli@3.21.2

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, deploy-vercel, deploy-railway]
    steps:
      - name: Health check — Cloudflare Worker
        run: |
          echo "Verifying Cloudflare Worker deployment..."
          curl -sf --retry 3 --retry-delay 5 \
            "${{ vars.CLOUDFLARE_WORKER_URL }}/health" || echo "::warning::Cloudflare health check pending — configure CLOUDFLARE_WORKER_URL variable"

      - name: Health check — Vercel
        run: |
          echo "Verifying Vercel deployment..."
          curl -sf --retry 3 --retry-delay 5 \
            "${{ vars.VERCEL_URL }}/api/health" || echo "::warning::Vercel health check pending — configure VERCEL_URL variable"

      - name: Health check — Railway
        run: |
          echo "Verifying Railway deployment..."
          curl -sf --retry 3 --retry-delay 5 \
            "${{ vars.RAILWAY_URL }}/health" || echo "::warning::Railway health check pending — configure RAILWAY_URL variable"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cloudflare Workers | Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel | Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway | Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ needs.build.outputs.commit_sha }}\` |" >> $GITHUB_STEP_SUMMARY
